version: "3.9"

services:
  db:
    image: postgres:16
    container_name: api-testing-platform-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: gurnoor15
      POSTGRES_DB: tasks_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: api-testing-platform
    depends_on:
      - db
    env_file:
      - .env.docker
    ports:
      - "8000:8000"

volumes:
  postgres_data: