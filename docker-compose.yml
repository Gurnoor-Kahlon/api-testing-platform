version: "3.9"

services:
  db:
    image: postgres:16
    container_name: api-testing-platform-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-tasks_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: api-testing-platform-api
    depends_on:
      - db
    env_file:
      - .env.docker
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@db:5432/tasks_db}
      TEST_DATABASE_URL: ${TEST_DATABASE_URL:-sqlite:///./test_app.db}
      REPORT_API_URL: ${REPORT_API_URL:-http://api:8000/test-runs}
      BACKEND_URL: ${BACKEND_URL:-http://api:8000}
      FRONTEND_URL: ${FRONTEND_URL:-http://frontend:5173}
      SELENIUM_URL: ${SELENIUM_URL:-http://selenium:4444}

  frontend:
    image: node:20-alpine
    container_name: api-testing-platform-frontend
    working_dir: /app
    depends_on:
      - api
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0"

  selenium:
    image: selenium/standalone-chrome:latest
    container_name: api-testing-platform-selenium
    ports:
      - "4444:4444"
    shm_size: 2gb
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  postgres_data:
  frontend_node_modules:
